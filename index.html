<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OpportunityHub - Scholarships, Jobs & Side Hustles</title>

  <meta name="description" content="Find scholarships, remote jobs, and side hustles in Nigeria, Africa, and globally. Updated daily.">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f6f7fb;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      background: white;
      padding: 10px;
    }

    nav a {
      text-decoration: none;
      color: #1a73e8;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .category {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>
  <h1>OpportunityHub</h1>
  <p>Scholarships • Jobs • Side Hustles</p>
</header>

<nav>
  <a href="/">Home</a>
  <a href="/post/scholarships/">Scholarships</a>
  <a href="/post/nigeria-opportunities/">Nigeria</a>
  <a href="/post/remote-jobs/">Remote Jobs</a>
  <a href="/post/side-hustles/">Side Hustles</a>
</nav>

<div class="container">
  <h2>Latest Opportunities</h2>
  <div id="posts">Loading...</div>
</div>

<script type="module">
import {
  db,
  collection,
  getDocs,
  query,
  orderBy,
  limit
} from "./js/firebase.js";

async function loadPosts() {
  const q = query(
    collection(db, "posts"),
    orderBy("createdAt", "desc"),
    limit(10)
  );

  const snapshot = await getDocs(q);

  let html = "";

  snapshot.forEach(doc => {
    const post = doc.data();

    html += `
      <div class="card">
        <div class="category">${post.category}</div>
        <h3>
          <a href="/post/${post.category}/${post.slug}.html">
            ${post.title}
          </a>
        </h3>
        <p>${post.description || ""}</p>
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

loadPosts();
</script>

</body>
  </html>
