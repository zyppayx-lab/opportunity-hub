<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Remote Jobs 2026 - Work From Home Opportunities</title>

  <meta name="description" content="Find remote jobs including customer support, tech jobs, writing and freelancing opportunities.">

  <style>
    body { font-family: Arial; margin:0; background:#f6f7fb; }
    header { background:#1a73e8; color:white; padding:20px; text-align:center; }

    .container { max-width:900px; margin:auto; padding:20px; }

    .card {
      background:white;
      padding:15px;
      margin-bottom:10px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    a { text-decoration:none; color:#1a73e8; }
  </style>
</head>

<body>

<header>
  <h1>Remote Jobs</h1>
  <p>Work from anywhere opportunities</p>
</header>

<div class="container">

  <h2>Latest Remote Jobs</h2>
  <div id="posts">Loading...</div>

</div>

<script type="module">
import {
  db,
  collection,
  getDocs,
  query,
  where
} from "../../js/firebase.js";

async function loadPosts() {
  const q = query(
    collection(db, "posts"),
    where("category", "==", "remote-jobs")
  );

  const snapshot = await getDocs(q);

  let html = "";

  snapshot.forEach(doc => {
    const post = doc.data();

    html += `
      <div class="card">
        <h3>
          <a href="/post/remote-jobs/${post.slug}.html">
            ${post.title}
          </a>
        </h3>
        <p>${post.description || ""}</p>
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

loadPosts();
</script>

</body>
</html>
